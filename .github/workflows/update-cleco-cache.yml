name: Update Cleco outage cache

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-cleco-cache
  cancel-in-progress: true

jobs:
  update-cleco-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Cleco outage data
        run: |
          python - <<'PY'
          import json
          import pathlib
          import urllib.request
          from datetime import datetime, timezone

          url = "https://cleco-prod.azure-api.net/outage/api/1/outage/alloutages/2/1"
          out_path = pathlib.Path("docs/data/cleco_outages.json")
          out_path.parent.mkdir(parents=True, exist_ok=True)

          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/json, text/plain, */*",
                  "User-Agent": "Mozilla/5.0 GitHubActions cwa-outage-viewer",
                  "Referer": "https://myaccount.cleco.com/",
              },
          )

          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))

          payload["cachedAtUtc"] = datetime.now(timezone.utc).isoformat()
          payload["sourceName"] = "Cleco outage map API"

          out_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(f"Wrote {out_path}")
          print(f"Incidents: {len(payload.get('data', []))}")
          PY

      - name: Commit updated Cleco cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/cleco_outages.json
          git diff --cached --quiet && echo "No Cleco cache changes" && exit 0
          git commit -m "Update Cleco outage cache"
          git push
